<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>AI Summarizer</title>
    <link rel="stylesheet" href="index.css" />
  </head>
  <body>
    <div class="container">
      <header
        style="
          display: flex;
          justify-content: space-between;
          align-items: flex-start;
        "
      >
        <div style="overflow: hidden">
          <h1>AI Summarizer</h1>
          <p id="page-title">Loading page info...</p>
        </div>
        <button
          id="theme-toggle"
          title="Toggle Theme"
          style="
            background: none;
            border: none;
            cursor: pointer;
            font-size: 1.2rem;
            padding: 4px;
          "
        ></button>
      </header>

      <main>
        <div id="initial-state">
          <button id="summarize-btn" class="primary-btn">Summarize Page</button>
        </div>

        <div id="loading-state" class="hidden">
          <div class="spinner"></div>
          <p>Analyzing content...</p>
        </div>

        <div id="summary-state" class="hidden">
          <div class="reading-time-badge" id="reading-time"></div>

          <section>
            <h3>Overview</h3>
            <p id="overview-text"></p>
          </section>

          <section>
            <h3>Key Insights</h3>
            <ul id="insights-list"></ul>
          </section>

          <div class="actions">
            <button id="copy-btn" class="secondary-btn">Copy Summary</button>
            <button id="reset-btn" class="text-btn">Clear</button>
          </div>
        </div>

        <div id="error-state" class="hidden">
          <p class="error-message"></p>
          <button id="retry-btn" class="primary-btn">Retry</button>
        </div>
      </main>

      <footer>
        <p>Powered by Donvictory 😁</p>
      </footer>
    </div>
    <script src="popup.js"></script>
  </body>
</html>
